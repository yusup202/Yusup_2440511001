<!DOCTYPE html>
<html lang="id">
<head>

    <title>Login</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>

<div class="container">
    <h1>Login 🔐</h1>

    <form onsubmit="loginUser(event)">

        <button type="submit">Login</button>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
